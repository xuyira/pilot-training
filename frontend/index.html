<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flight Cognitive Training</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Flight Cognitive Training System</p>
          <h1>飞行认知训练系统</h1>
        </div>
        <div class="topbar-meta">
          <span id="server-status" class="status-pill">Backend Ready</span>
          <span id="app-version" class="status-pill muted">v0.1.0</span>
        </div>
      </header>

      <main id="app" class="page-root"></main>
    </div>

    <template id="setup-template">
      <section class="hero-grid">
        <div class="hero-copy card glow-card">
          <p class="section-label">System Overview</p>
          <h2>面向飞行场景的轻量认知训练系统</h2>
          <p class="lead">
            飞行认知训练的核心，不只是教飞行知识或操纵技巧，还包括对非技术认知能力的训练；但传统训练往往依赖教员经验、固定脚本或高成本模拟器，缺乏一种可低成本、可持续、可个体化调节训练挑战度的轻量系统。
          </p>
          <div class="hero-points">
            <div>
              <strong>能力拆分与重组</strong>
              <span>围绕飞行中的关键认知需求进行抽象，构建可独立训练的模块化任务。</span>
            </div>
            <div>
              <strong>动态难度调节</strong>
              <span>根据训练表现调节挑战度，使受训者尽量维持在“刚好需要努力”的有效训练区间。</span>
            </div>
            <div>
              <strong>实验友好架构</strong>
              <span>前端负责交互呈现，后端负责日志、marker 与后续脑电接口，便于快速迭代和实验落地。</span>
            </div>
          </div>
        </div>

        <form id="setup-form" class="card form-card">
          <div class="form-header">
            <p class="section-label">Session Setup</p>
            <h2>开始一轮训练</h2>
          </div>

          <label>
            <span>被试 ID</span>
            <input name="subject_id" placeholder="例如 12" required />
          </label>

          <label>
            <span>Session ID</span>
            <input name="session_id" placeholder="例如 1" required />
          </label>

          <label>
            <span>实验员</span>
            <input name="experimenter" placeholder="可选" />
          </label>

          <div class="segmented">
            <button type="button" data-module="module_a" class="segment is-active">持续监控与响应控制训练</button>
            <button type="button" data-module="module_b" class="segment">动态任务管理训练</button>
          </div>

          <div class="segmented">
            <button type="button" data-mode="fixed" class="segment is-active">固定难度</button>
            <button type="button" data-mode="adaptive" class="segment">自适应难度</button>
          </div>

          <label>
            <span>试验时长（分钟）</span>
            <input name="duration_minutes" type="number" min="1" step="1" placeholder="例如 5" required />
          </label>

          <div>
            <span class="field-label">初始等级</span>
            <div class="level-grid" id="level-grid"></div>
          </div>

          <div class="form-footer">
            <button type="submit" class="primary-btn">开始训练</button>
            <p id="setup-hint" class="muted-text"></p>
          </div>
        </form>
      </section>
    </template>

    <template id="countdown-template">
      <section class="stage immersive-stage">
        <div class="immersive-stage-inner">
          <p class="section-label">准备开始</p>
          <h2 id="countdown-module-title"></h2>
          <p id="countdown-mode-line" class="muted-text"></p>
        </div>
        <div id="countdown-number" class="countdown-number">3</div>
        <p class="stage-caption">请保持注视，准备开始</p>
      </section>
    </template>

    <template id="block-template">
      <section class="immersive-block">
        <div class="immersive-hud">
          <div>
            <p class="section-label">本次训练</p>
            <h2 id="block-module-title"></h2>
          </div>
          <div class="immersive-meta">
            <div class="timer-card">
              <span>剩余时间</span>
              <strong id="block-timer">12s</strong>
            </div>
            <div class="timer-card compact">
              <span>等级</span>
              <strong id="block-level"></strong>
            </div>
          </div>
        </div>

        <div id="module-scene" class="module-scene"></div>

        <div class="immersive-footer">
          <p id="key-hints"></p>
          <p id="block-rule-line" class="muted-text"></p>
          <p id="block-module-desc" class="muted-text"></p>
          <div id="module-lines" class="visually-hidden"></div>
          <div id="block-mode" class="visually-hidden"></div>
          <div id="block-id" class="visually-hidden"></div>
          <div id="session-dir" class="visually-hidden"></div>
          <pre id="level-config" class="visually-hidden"></pre>
          <div class="visually-hidden">
            <span id="event-count">0</span>
            <span id="last-key">-</span>
          </div>
        </div>
      </section>
    </template>

    <template id="result-template">
      <section class="result-layout">
        <div class="card result-primary glow-card">
          <p class="section-label">训练结果</p>
          <h2 id="result-title"></h2>
          <p id="result-note" class="lead"></p>
          <div class="result-grid">
            <div>
              <span>等级变化</span>
              <strong id="result-levels"></strong>
            </div>
            <div>
              <span>记录事件数</span>
              <strong id="result-events"></strong>
            </div>
            <div>
              <span>日志目录</span>
              <strong id="result-logdir"></strong>
            </div>
          </div>
        </div>

        <div class="card result-secondary">
          <p class="section-label">指标详情</p>
          <pre id="result-metrics"></pre>
          <div class="result-actions">
            <button id="restart-btn" class="primary-btn">返回首页</button>
          </div>
        </div>
      </section>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
